<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>授業料計算アプリ</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
    :root { --bg: #F2F2F7; --card: #FFFFFF; --primary: #007AFF; --success: #34C759; --danger: #FF3B30; --text: #1C1C1E; --sub: #8E8E93; --border: #C6C6C8; }
    html, body { width: 100%; height: 100%; overflow: hidden; background-color: var(--bg); color: var(--text); font-size: 16px; scroll-behavior: smooth; }
    
    #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #fff; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
    #loadingOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.98); z-index: 99998; display: none; flex-direction: column; justify-content: center; align-items: center; }
    .spinner { border: 3px solid #E5E5EA; border-top: 3px solid var(--primary); border-radius: 50%; width: 36px; height: 36px; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .view { display: none; height: 100%; width: 100%; overflow-y: auto; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }
    .view.active { display: block; animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    
    .header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 16px 16px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .header-title { font-size: 17px; font-weight: 600; text-align: center; flex: 1; }
    
    .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.95); border-top: 0.5px solid var(--border); display: flex; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom, 20px); z-index: 900; }
    .tab-item { flex: 1; text-align: center; padding: 10px 0; color: var(--sub); font-size: 11px; font-weight: 500; cursor: pointer; }
    .tab-item.active { color: var(--primary); }
    .tab-icon { font-size: 24px; display: block; margin-bottom: 4px; }
    
    .main-content { padding-top: 16px; }
    .section-title { font-size: 13px; color: #6D6D72; text-transform: uppercase; margin: 0 0 6px 16px; font-weight: 500; }
    .card { background: var(--card); margin-bottom: 22px; border-top: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; min-height: 48px; background: #fff; border-bottom: 0.5px solid var(--border); }
    .row:last-child { border-bottom: none; }
    
    .input-wrapper { flex: 1; display: flex; flex-direction: column; width: 100%; }
    .input-label { font-size: 12px; color: var(--sub); margin-bottom: 5px; font-weight: 600; }
    .select-full, .input-box { width: 100%; background: #F2F2F7; padding: 12px 14px; border-radius: 8px; color: var(--text); font-weight: 500; border: none; font-size: 16px; outline:none; }
    .btn-main { width: calc(100% - 32px); padding: 16px; border-radius: 12px; font-size: 17px; font-weight: 600; border: none; background: var(--primary); color: #fff; margin: 16px; text-align: center; cursor: pointer; }
    .btn-text { background: none; color: var(--primary); border: none; font-size: 16px; font-weight: 600; padding: 6px; cursor: pointer; }
    .btn-add { color: var(--primary); background: none; border: none; font-size: 16px; font-weight: 600; width: 100%; text-align: left; cursor: pointer; }
    .btn-outline { color: var(--primary); background: transparent; border: 1.5px solid var(--primary); padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 600; width: calc(100% - 32px); margin: 0 16px 24px; text-align: center; cursor: pointer; }
    
    .manage-grid { display: flex; flex-wrap: wrap; gap: 10px; padding: 0 16px 16px; }
    .m-tab { flex: 1 1 calc(50% - 5px); text-align: center; padding: 14px 8px; font-size: 14px; font-weight: 600; border-radius: 12px; background: #E3E3E8; color: #555; cursor: pointer; border: 1px solid transparent; }
    .m-tab.active { background: #E5F1FF; color: var(--primary); border-color: var(--primary); }
    
    .switch-container { width: 51px; height: 31px; position: relative; }
    .switch { position: relative; display: inline-block; width: 51px; height: 31px; }
    .switch input { display: none; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #E9E9EA; transition: .3s; border-radius: 31px; }
    .slider:before { position: absolute; content: ""; height: 27px; width: 27px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--success); }
    input:checked + .slider:before { transform: translateX(20px); }

    .receipt { background: #fff; padding: 24px 20px; margin: 30px 16px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.04); }
    .r-item-main { display: flex; justify-content: space-between; font-weight: 600; margin-top: 12px; font-size: 15px; }
    .r-item-sub, .r-item-disc { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-top: 4px; padding-left: 12px; }
    .r-item-disc { color: var(--danger); font-weight: 500; }
    .r-item-final { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; border-bottom: 1px solid #eee; padding-bottom: 12px; margin-top: 8px; padding-top: 8px; }
    .r-total { font-size: 25px; font-weight: 800; text-align: right; margin-top: 20px; padding-top: 15px; border-top: 2px solid #000; }
    
    .manage-area { display: none; } .manage-area.active { display: block; animation: fadeIn 0.2s; }
    .list-item { padding: 14px 16px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; background: #fff; align-items:center; cursor: pointer; }
    
    .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 1000; transform: translateY(100%); transition: transform 0.3s; display: flex; flex-direction: column; }
    .modal.active { transform: translateY(0); }
    .search-bar { background: #D1D1D6; padding: 10px 16px; display: flex; align-items: center; }
    .search-input { flex: 1; background: #fff; border-radius: 10px; padding: 10px 12px; border:none; font-size: 17px; outline:none; }
</style>
</head>
<body>

<div id="overlay">
    <h2 style="margin-bottom:20px;">パスワードを入力</h2>
    <input type="password" id="passInput" style="width:90%; padding:15px; border-radius:10px; border:1px solid #ccc; margin-bottom:20px; font-size:18px; text-align:center;" placeholder="****">
    <button class="btn-main" onclick="tryLogin()" style="margin:0; width:90%;">ログイン</button>
    <div id="errorLog" style="color:red; margin-top:20px; font-size:13px; font-weight:bold;"></div>
</div>

<div id="loadingOverlay"><div class="spinner"></div><div class="loading-text">データを読み込み中...</div></div>

<div class="tab-bar">
    <div class="tab-item active" onclick="switchView('calc', this)"><span class="tab-icon">🛒</span>レジ</div>
    <div class="tab-item" onclick="switchView('hist', this)"><span class="tab-icon">🕒</span>履歴</div>
    <div class="tab-item" onclick="switchView('manage', this)"><span class="tab-icon">⚙️</span>管理</div>
</div>

<div class="view active" id="view-calc">
    <div class="header"><div style="width:60px;"></div><div class="header-title">授業料計算アプリ</div><div style="width:60px;"></div></div>
    <div class="main-content">
        <div class="section-title">顧客情報</div>
        <div class="card"><div class="row"><div class="input-wrapper"><label class="input-label">顧客種別</label><select id="customerType" class="select-full"></select></div></div></div>
        <div class="section-title">教室と講師</div>
        <div class="card">
            <div class="row"><div class="input-wrapper"><label class="input-label">教室を選択</label><select id="calcClassroom" class="select-full" onchange="updateTeacherSelect()"></select></div></div>
            <div class="row"><div class="input-wrapper"><label class="input-label">講師を選択</label><select id="calcTeacher" class="select-full"></select></div></div>
        </div>
        <div class="section-title">授業セット</div>
        <div id="courseBlocksArea"></div>
        <button class="btn-outline" onclick="addCourseBlock()">＋ 別の授業セットを追加する</button>
        <div class="section-title">教材・アイテム</div>
        <div class="card" id="itemSelectionArea"><div class="row"><button class="btn-add" onclick="addItemRow()">＋ 教材を追加する</button></div></div>
        <button class="btn-main" onclick="calculateTotal()">お支払い額を計算</button>

        <div class="receipt" id="resultArea" style="display: none;">
            <div class="r-title">お見積り明細</div>
            <div id="receiptHeaderInfo" style="font-size:14px; color:#666; margin-bottom:12px;"></div>
            <div id="resultBody"></div>
            <div id="receiptSummaryArea"></div>
            <div id="paymentOptions" style="margin-top:20px; font-size:14px; color:#555; background:#F2F2F7; padding:16px; border-radius:12px;"></div>
        </div>
    </div>
</div>

<div class="view" id="view-hist"><div class="header"><div style="width:60px;"></div><div class="header-title">計算履歴</div><div style="width:60px;"></div></div><div class="main-content" id="historyArea"></div></div>

<div class="view" id="view-manage">
    <div class="header"><button class="btn-text" onclick="loadAllData()" style="font-size:15px;">再読込</button><div class="header-title">リスト管理</div><div style="width:60px;"></div></div>
    <div class="main-content">
        <div class="manage-grid">
            <div class="m-tab active" onclick="switchManageTab('course', this)">授業設定</div>
            <div class="m-tab" onclick="switchManageTab('item', this)">教材設定</div>
            <div class="m-tab" onclick="switchManageTab('option', this)">授業オプション</div>
            <div class="m-tab" onclick="switchManageTab('disc', this)">自動割引ルール</div>
            <div class="m-tab" onclick="switchManageTab('class', this)">教室設定</div>
            <div class="m-tab" onclick="switchManageTab('teacher', this)">講師設定</div>
        </div>
        <div id="m-area-course" class="manage-area active"><div class="card" id="manageCourseList"></div><button class="btn-main" onclick="openEditModal('course', -1)">＋ 授業追加</button></div>
        <div id="m-area-item" class="manage-area"><div class="card" id="manageItemList"></div><button class="btn-main" onclick="openEditModal('item', -1)">＋ 教材追加</button></div>
        <div id="m-area-option" class="manage-area"><div class="card" id="manageOptionList"></div><button class="btn-main" onclick="openEditModal('option', -1)">＋ オプション追加</button></div>
        <div id="m-area-disc" class="manage-area"><div class="card" id="manageDiscList"></div><button class="btn-main" onclick="openEditModal('disc', -1)">＋ 割引設定を追加</button></div>
        <div id="m-area-class" class="manage-area"><div class="card" id="manageClassList"></div><button class="btn-main" onclick="openEditModal('class', -1)">＋ 教室追加</button></div>
        <div id="m-area-teacher" class="manage-area"><div class="card" id="manageTeacherList"></div><button class="btn-main" onclick="openEditModal('teacher', -1)">＋ 講師追加</button></div>
    </div>
</div>

<div id="searchModal" class="modal"><div class="header"><button class="btn-text" onclick="closeModal('searchModal')">戻る</button><div class="header-title">検索</div><div style="width:60px;"></div></div><div class="search-bar"><input type="text" id="searchInput" class="search-input" placeholder="検索..." oninput="filterSearch()"></div><div id="searchList" style="overflow-y:auto; flex:1;"></div></div>

<div id="editModal" class="modal"><div class="header"><button class="btn-text" onclick="closeModal('editModal')" style="color:var(--danger);">キャンセル</button><div class="header-title" id="editTitle">編集</div><button class="btn-text" onclick="saveMaster()">保存する</button></div>
    <div class="main-content" style="padding:16px;">
        <input type="hidden" id="editType"><input type="hidden" id="editIndex">
        <div id="editArea_course" style="display:none;"><div class="input-wrapper"><label class="input-label">①授業コード</label><input type="text" id="e_c_code" class="input-box"></div><div class="input-wrapper"><label class="input-label">②授業名</label><input type="text" id="e_c_name" class="input-box"></div><div class="input-wrapper"><label class="input-label">③金額</label><input type="number" id="e_c_price" class="input-box"></div></div>
        <div id="editArea_item" style="display:none;"><div class="input-wrapper"><label class="input-label">①教材名</label><input type="text" id="e_i_name" class="input-box"></div><div class="input-wrapper"><label class="input-label">②商品コード</label><input type="text" id="e_i_code" class="input-box"></div><div class="input-wrapper"><label class="input-label">③金額</label><input type="number" id="e_i_price" class="input-box"></div></div>
        <div id="editArea_option" style="display:none;"><div class="input-wrapper"><label class="input-label">①オプション名</label><input type="text" id="e_o_name" class="input-box"></div><div class="input-wrapper"><label class="input-label">②金額</label><input type="number" id="e_o_price" class="input-box"></div></div>
        <div id="editArea_disc" style="display:none;"><div class="input-wrapper"><label class="input-label">①対象名</label><select id="e_d_target" class="select-full"></select></div><div class="input-wrapper"><label class="input-label">②顧客種別</label><select id="e_d_cust" class="select-full"></select></div><div class="input-wrapper"><label class="input-label">③種類</label><select id="e_d_type" class="select-full"><option value="percent">％引き</option><option value="amount">円引き</option></select></div><div class="input-wrapper"><label class="input-label">④数字</label><input type="number" id="e_d_val" class="input-box"></div></div>
        <div id="editArea_class" style="display:none;"><div class="input-wrapper"><label class="input-label">教室名</label><input type="text" id="e_cl_name" class="input-box"></div><div class="input-wrapper"><label class="input-label">教室コード</label><input type="text" id="e_cl_code" class="input-box"></div></div>
        <div id="editArea_teacher" style="display:none;"><div class="input-wrapper"><label class="input-label">所属教室</label><select id="e_t_class" class="select-full"></select></div><div class="input-wrapper"><label class="input-label">講師名</label><input type="text" id="e_t_name" class="input-box"></div><div class="input-wrapper"><label class="input-label">講師コード</label><input type="text" id="e_t_code" class="input-box"></div></div>
        <button id="delBtn" class="btn-outline" style="color:var(--danger); border-color:var(--danger); margin-top:24px;" onclick="deleteMaster()">削除する</button>
    </div>
</div>

function tryLogin() {
    if(document.getElementById('passInput').value === MY_PASS) {
        document.getElementById('overlay').style.display = 'none';
        loadAllData();
    } else {
        document.getElementById('errorLog').innerText = "パスワードが違います。";
    }
}

function loadAllData() {
    document.getElementById('loadingOverlay').style.display = 'flex';
    google.script.run.withSuccessHandler((data) => {
        if (!data || (!data.courses.length && !data.items.length)) {
            const def = generateDefaultData();
            courses=def.courses; items=def.items; options=def.options; classes=def.classes; teachers=def.teachers; discounts=def.discounts; histories=[];
            google.script.run.saveAllMasters(def);
        } else {
            courses=data.courses||[]; items=data.items||[]; options=data.options||[]; classes=data.classes||[]; teachers=data.teachers||[]; discounts=data.discounts||[]; histories=data.histories||[];
        }
        initUI();
        document.getElementById('loadingOverlay').style.display = 'none';
    }).withFailureHandler((err) => {
        document.getElementById('loadingOverlay').style.display = 'none';
        alert("データの読み込みに失敗しました。\n" + err.message);
    }).loadData();
}

function initUI() {
    const selC = document.getElementById('calcClassroom');
    selC.innerHTML = '<option value="">-- 教室を選択 --</option>';
    classes.forEach(c => selC.innerHTML += `<option value="${c.name}">${c.name}</option>`);
    
    const selCust = document.getElementById('customerType');
    selCust.innerHTML = '';
    C_TYPES.forEach(t => selCust.innerHTML += `<option value="${t}">${t}${t==='一般'?' (割引なし)':''}</option>`);

    renderManageLists();
    if(document.getElementById('courseBlocksArea').innerHTML === '') addCourseBlock();
}

function updateTeacherSelect() {
    const cls = document.getElementById('calcClassroom').value, sel = document.getElementById('calcTeacher');
    sel.innerHTML = '<option value="">-- 講師を選択 --</option>';
    teachers.filter(t => t.classroom === cls).forEach(t => sel.innerHTML += `<option value="${t.code}">${t.name}</option>`);
}

function clearCourse(blockId) {
    const block = document.getElementById(blockId);

let searchType, targetId;
function openSearch(type, id) { searchType = type; targetId = id; document.getElementById('searchModal').classList.add('active'); renderSearchList(''); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function renderSearchList(q) {
    const list = document.getElementById('searchList'); list.innerHTML='';
    let data = (searchType === 'course') ? courses : (searchType === 'option') ? options : items;
    data.forEach((d, idx) => {
        if(!q || d.name.includes(q)) {
            let div = document.createElement('div'); div.className='list-item';
            div.innerHTML = `<div><div style="font-weight:600; font-size:16px;">${d.name}</div></div><div style="color:var(--primary); font-weight:700; font-size:17px;">¥${Number(d.price||0).toLocaleString()}</div>`;
            div.onclick = () => {
                let t = document.getElementById(targetId);
                if (searchType === 'course') {
                    t.querySelector('.c-name').innerHTML = `<span style="font-size:16px;">${d.name}</span> <span style="float:right; font-size:16px;">¥${Number(d.price||0).toLocaleString()}</span>`;
                    t.querySelector('.c-idx').value = idx;
                    t.querySelector('.c-del-btn').style.display = 'block';
                    let optArea = t.querySelector('.c-options-area'); optArea.innerHTML = '';
                    if(d.options) d.options.forEach(opt => {
                        let n = opt.name||opt[0], p = opt.price||opt[1];
                        optArea.innerHTML += `<div class="row" style="background:#F9F9F9; border-top:0.5px solid #e5e5ea;"><label style="font-size:14px; color:#333;">+ 付属: ${n}</label><div class="switch-container"><label class="switch"><input type="checkbox" class="course-option-chk" data-name="${n}" data-price="${p}"><span class="slider"></span></label></div></div>`;
                    });
                } else if (searchType === 'option') {
                    t.querySelector('.c-standalone-area').innerHTML += `<div class="row" style="background:#F9F9F9; border-top:0.5px solid #e5e5ea;"><div style="font-size:14px; font-weight:500;">+ ｵﾌﾟｼｮﾝ: ${d.name}</div><div style="display:flex; align-items:center;"><span style="font-weight:700; margin-right:12px;">¥${Number(d.price||0).toLocaleString()}</span><button class="btn-text" style="color:var(--danger); font-size:13px; padding:0;" onclick="this.parentElement.parentElement.remove()">削除</button><input type="hidden" class="standalone-opt-val" data-name="${d.name}" data-price="${d.price}"></div></div>`;
                } else {
                    t.querySelector('.i-name').innerHTML = `<span style="font-size:16px;">${d.name}</span> <span style="float:right; font-size:16px;">¥${Number(d.price||0).toLocaleString()}</span>`;
                    t.querySelector('.i-idx').value = idx;
                }
                closeModal('searchModal');
            };
            list.appendChild(div);
        }
    });
}

    let id = 'i-' + Date.now();
    let div = document.createElement('div'); div.className='row'; div.id=id;
    div.innerHTML = `<div style="width:100%;"><button class="btn-add" onclick="openSearch('item','${id}')"><span class="i-name">教材を選択...</span></button><input type="hidden" class="i-idx" value=""><div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px;"><button class="btn-text" style="color:var(--danger); font-size:14px; padding:0;" onclick="document.getElementById('${id}').remove()">削除</button><div style="display:flex; align-items:center; background:#E5E5EA; border-radius:10px; padding:4px;"><button style="background:none;border:none;font-size:22px;width:36px;color:#000;" onclick="changeQty(this,-1)">−</button><input class="qty" value="1" readonly style="width:30px;text-align:center;border:none;background:none;font-weight:700;font-size:16px;color:#000;"><button style="background:none;border:none;font-size:22px;width:36px;color:#000;" onclick="changeQty(this,1)">＋</button></div></div></div>`;
    document.getElementById('itemSelectionArea').insertBefore(div, document.getElementById('itemSelectionArea').lastElementChild);
}
function changeQty(b, a) { let i=b.parentElement.querySelector('input'); let v=parseInt(i.value); if(v+a>=1) i.value=v+a; }

function calculateTotal() {
    const cust = document.getElementById('customerType').value, cls = document.getElementById('calcClassroom').value, tCode = document.getElementById('calcTeacher').value;
    let gTotal = 0, totalDisc = 0;
    const body = document.getElementById('resultBody'); body.innerHTML='';
    document.getElementById('receiptHeaderInfo').innerHTML = `顧客種別: <b>${cust}</b> / 教室: <b>${cls||'-'}</b> / 講師: <b>${tCode||'-'}</b>`;

    document.querySelectorAll('.course-block').forEach(block => {
        let ci = block.querySelector('.c-idx').value, bSum = 0;
        if(ci !== "") {
            const c = courses[ci];
            let basePlus = Number(c.price||0) + (block.querySelector('.c-weekend').checked ? 1000 : 0) + (block.querySelector('.c-night').checked ? 1000 : 0);
            
            let dRule = (cust==="一般") ? null : discounts.find(d => d.target === c.name && d.cust === cust);
            if (cust === "助講師会長" && isNoDiscountForKaicho(c.name)) dRule = null;
            
            let disc = dRule ? (dRule.type==='percent' ? Math.floor(basePlus*(Number(dRule.val||0)/100)) : Number(dRule.val||0)) : 0;
            let final = basePlus - disc; totalDisc += disc; bSum += final;
            
            body.innerHTML += `<div class="r-item-main"><span>[授業] ${c.name}</span><span>¥${final.toLocaleString()}</span></div>`;
            if(disc > 0) body.innerHTML += `<div class="r-item-disc">└ 割引 (${cust})<span>-¥${disc.toLocaleString()}</span></div>`;
            block.querySelectorAll('.course-option-chk:checked').forEach(chk => { let p=parseInt(chk.dataset.price); bSum+=p; body.innerHTML+=`<div class="r-item-sub"><span>+ 付属: ${chk.dataset.name}</span><span>¥${p.toLocaleString()}</span></div>`; });
        }
        block.querySelectorAll('.standalone-opt-val').forEach(opt => { let p=parseInt(opt.dataset.price); bSum+=p; body.innerHTML+=`<div class="r-item-sub"><span>+ 単体: ${opt.dataset.name}</span><span>¥${p.toLocaleString()}</span></div>`; });
        if(bSum > 0) { body.innerHTML += `<div class="r-item-final">授業セット 計<span>¥${bSum.toLocaleString()}</span></div>`; gTotal += bSum; }
    });

    document.querySelectorAll('.i-idx').forEach(el => {
        if(!el.value) return;
        const i = items[el.value], q = parseInt(el.parentElement.querySelector('.qty').value);
        let sub = Number(i.price||0) * q;
        
        let dRule = (cust==="一般") ? null : discounts.find(d => d.target === i.name && d.cust === cust);
        if (cust === "助講師会長" && isNoDiscountForKaicho(i.name)) dRule = null;
        
        let disc = dRule ? (dRule.type==='percent' ? Math.floor(sub*(Number(dRule.val||0)/100)) : Number(dRule.val||0) * q) : 0;
        let final = sub - disc; totalDisc += disc; gTotal += final;
        
        body.innerHTML += `<div class="r-item-main"><span>[教材] ${i.name} (x${q})</span><span>¥${final.toLocaleString()}</span></div>`;
        if(disc > 0) body.innerHTML += `<div class="r-item-disc">└ 教材割引 (${cust})<span>-¥${disc.toLocaleString()}</span></div>`;
    });

    let sHtml = (totalDisc > 0 ? `<div class="r-item-main" style="color:var(--danger); margin-bottom:8px;"><span>🌟 割引合計</span><span>-¥${totalDisc.toLocaleString()}</span></div>` : '');
    sHtml += `<div class="r-total">お支払い合計 ¥${gTotal.toLocaleString()}</div>`;
    document.getElementById('receiptSummaryArea').innerHTML = sHtml;
    
    let payHtml = '';
    [3,6,10].forEach(n => { let m=Math.floor(gTotal/n); if(m>=3000) payHtml+=`<div style="display:flex; justify-content:space-between; margin-top:4px;"><span>${n}回払い</span><span>月々 約 ¥${m.toLocaleString()}</span></div>`; });
    document.getElementById('paymentOptions').innerHTML = payHtml;
    document.getElementById('resultArea').style.display='block';
    
    google.script.run.appendHistory({date: new Date().toLocaleString('ja-JP'), customer: cust, class: cls, teacher: tCode, total: gTotal, details: [] });
}

function renderManageLists() {
    const L = (id, data, type) => {
        const el = document.getElementById(id); el.innerHTML = '';
        data.forEach((d, idx) => el.innerHTML += `<div class="list-item" onclick="openEditModal('${type}',${idx})"><div><b>${d.name||d.target||''}</b></div><div style="color:var(--primary); font-weight:700;">¥${Number(d.price||d.val||0).toLocaleString()}</div></div>`);
    };
    L('manageCourseList', courses, 'course'); L('manageItemList', items, 'item'); L('manageOptionList', options, 'option');
    
    const LD = (id, data, type) => {
        const el = document.getElementById(id); el.innerHTML = '';
        data.forEach((d, idx) => el.innerHTML += `<div class="list-item" onclick="openEditModal('${type}',${idx})"><div>${d.target} (${d.cust})</div><div style="color:var(--danger); font-weight:700;">${d.val}${d.type==='percent'?'%引':'円引'}</div></div>`);
    };
    LD('manageDiscList', discounts, 'disc');
    
    let cEl=document.getElementById('manageClassList'); cEl.innerHTML=''; classes.forEach((c,idx)=>cEl.innerHTML+=`<div class="list-item" onclick="openEditModal('class',${idx})"><div>${c.name}</div><div style="color:var(--sub);">${c.code}</div></div>`);
    let tEl=document.getElementById('manageTeacherList'); tEl.innerHTML=''; teachers.forEach((t,idx)=>tEl.innerHTML+=`<div class="list-item" onclick="openEditModal('teacher',${idx})"><div>${t.name} (所属: ${t.classroom})</div><div style="color:var(--sub);">${t.code}</div></div>`);
}

function openEditModal(t, i) {
    document.getElementById('editType').value=t; document.getElementById('editIndex').value=i;
    ['course','item','option','disc','class','teacher'].forEach(x => document.getElementById('editArea_'+x).style.display='none');
    
    if(t === 'disc') {
        document.getElementById('editArea_disc').style.display='block';
        const selT = document.getElementById('e_d_target'); selT.innerHTML = '';
        courses.forEach(x => selT.innerHTML += `<option value="${x.name}">${x.name}</option>`);
        items.forEach(x => selT.innerHTML += `<option value="${x.name}">${x.name}</option>`);
        const selC = document.getElementById('e_d_cust'); selC.innerHTML = '';
        C_TYPES.forEach(x => selC.innerHTML += `<option value="${x}">${x}</option>`);
        if(i!==-1) {
            let d = discounts[i];
            selT.value = d.target; selC.value = d.cust; document.getElementById('e_d_type').value = d.type; document.getElementById('e_d_val').value = d.val;
        } else { document.getElementById('e_d_val').value = ''; }
    } else {
        document.getElementById('editArea_'+t).style.display='block';
        if(t==='teacher') { const selC = document.getElementById('e_t_class'); selC.innerHTML = ''; classes.forEach(c => selC.innerHTML += `<option value="${c.name}">${c.name}</option>`); }
        if(i===-1) {
            if(t==='course') { document.getElementById('e_c_code').value=''; document.getElementById('e_c_name').value=''; document.getElementById('e_c_price').value=''; }
            if(t==='item') { document.getElementById('e_i_code').value=''; document.getElementById('e_i_name').value=''; document.getElementById('e_i_price').value=''; }
            if(t==='option') { document.getElementById('e_o_name').value=''; document.getElementById('e_o_price').value=''; }
            if(t==='class') { document.getElementById('e_cl_code').value=''; document.getElementById('e_cl_name').value=''; }
            if(t==='teacher') { document.getElementById('e_t_code').value=''; document.getElementById('e_t_name').value=''; }
        } else {
            let d = (t==='course')?courses[i]:(t==='item')?items[i]:(t==='option')?options[i]:(t==='class')?classes[i]:teachers[i];
            if(t==='course') { document.getElementById('e_c_code').value=d.code||''; document.getElementById('e_c_name').value=d.name; document.getElementById('e_c_price').value=d.price; }
            if(t==='item') { document.getElementById('e_i_code').value=d.code||''; document.getElementById('e_i_name').value=d.name; document.getElementById('e_i_price').value=d.price; }
            if(t==='option') { document.getElementById('e_o_name').value=d.name; document.getElementById('e_o_price').value=d.price; }
            if(t==='class') { document.getElementById('e_cl_code').value=d.code; document.getElementById('e_cl_name').value=d.name; }
            if(t==='teacher') { document.getElementById('e_t_class').value=d.classroom; document.getElementById('e_t_name').value=d.name; document.getElementById('e_t_code').value=d.code; }
        }
    }
    document.getElementById('delBtn').style.display = (i===-1) ? 'none' : 'block';
    document.getElementById('editModal').classList.add('active');
}

function saveMaster() {
    const t=document.getElementById('editType').value, i=parseInt(document.getElementById('editIndex').value);
    document.getElementById('loadingOverlay').style.display = 'flex';
    
    let sName = (t==='course')?'courses':(t==='item')?'items':(t==='option')?'options':(t==='class')?'classes':(t==='teacher')?'teachers':'discounts';
    
    if(t === 'disc') {
        let obj = {target:document.getElementById('e_d_target').value, cust:document.getElementById('e_d_cust').value, type:document.getElementById('e_d_type').value, val:parseInt(document.getElementById('e_d_val').value)};
        if(i===-1) discounts.push(obj); else discounts[i]=obj;
        google.script.run.withSuccessHandler(()=>{ document.getElementById('loadingOverlay').style.display='none'; renderManageLists(); closeModal('editModal'); }).saveMasterData(sName, discounts);
    } else {
        let obj={};
        if(t==='course'){ obj={code:document.getElementById('e_c_code').value, name:document.getElementById('e_c_name').value, price:parseInt(document.getElementById('e_c_price').value)||0, options:(i!==-1)?courses[i].options:[]}; if(i===-1)courses.push(obj); else courses[i]=Object.assign(courses[i], obj); }
        if(t==='item'){ obj={name:document.getElementById('e_i_name').value, code:document.getElementById('e_i_code').value, price:parseInt(document.getElementById('e_i_price').value)||0}; if(i===-1)items.push(obj); else items[i]=Object.assign(items[i], obj); }
        if(t==='option'){ obj={name:document.getElementById('e_o_name').value, price:parseInt(document.getElementById('e_o_price').value)||0}; if(i===-1)options.push(obj); else options[i]=Object.assign(options[i], obj); }
        if(t==='class'){ obj={code:document.getElementById('e_cl_code').value, name:document.getElementById('e_cl_name').value}; if(i===-1)classes.push(obj); else classes[i]=obj; }
        if(t==='teacher'){ obj={classroom:document.getElementById('e_t_class').value, name:document.getElementById('e_t_name').value, code:document.getElementById('e_t_code').value}; if(i===-1)teachers.push(obj); else teachers[i]=obj; }
        
        let arr = (t==='course')?courses:(t==='item')?items:(t==='option')?options:(t==='class')?classes:teachers;
        google.script.run.withSuccessHandler(()=>{ document.getElementById('loadingOverlay').style.display='none'; renderManageLists(); closeModal('editModal'); if(t==='class')initUI(); }).saveMasterData(sName, arr);
    }
}

function deleteMaster() {
    if(!confirm("本当に削除しますか？")) return;
    const t=document.getElementById('editType').value, i=parseInt(document.getElementById('editIndex').value);
    document.getElementById('loadingOverlay').style.display = 'flex';
    
    let sName = (t==='course')?'courses':(t==='item')?'items':(t==='option')?'options':(t==='class')?'classes':(t==='teacher')?'teachers':'discounts';
    let arr = (t==='course')?courses:(t==='item')?items:(t==='option')?options:(t==='class')?classes:(t==='teacher')?teachers:discounts;
    arr.splice(i,1);
    
    google.script.run.withSuccessHandler(()=>{ document.getElementById('loadingOverlay').style.display='none'; renderManageLists(); closeModal('editModal'); if(t==='class')initUI(); }).saveMasterData(sName, arr);
}

function switchView(id, el) { 
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById('view-'+id).classList.add('active'); 
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active')); el.classList.add('active'); window.scrollTo({top:0});
}
function switchManageTab(id, el) { 
    document.querySelectorAll('.manage-area').forEach(v => v.classList.remove('active')); document.getElementById('m-area-'+id).classList.add('active'); 
    document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); 
}
</script>
